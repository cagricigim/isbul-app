workflows:
    android-release:
      name: Android Release (APK)
      max_build_duration: 60
      environment:
        node: 20.17.0
        vars:
          EXPO_PUBLIC_DOMAIN: api.isinebakk.app
          EXPO_PUBLIC_REVENUECAT_ANDROID_API_KEY: goog_vfavRAjFKGlcqqcMLAGqqeDhKdD
        groups:
          - isbul_secrets

      scripts:
        - name: Install dependencies
          script: |
            npm install

        - name: Build Android APK
          script: |
            cd android
            chmod +x gradlew
            ./gradlew assembleRelease

      artifacts:
        - android/app/build/outputs/apk/release/*.apk
        - android/app/build/outputs/bundle/release/*.aab
  
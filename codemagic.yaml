workflows:
  android-release:
    name: Android Release (İşine Bak)
    max_build_duration: 60
    environment:
      flutter: 3.24.5
      java: 17
      groups:
        - isbul_secrets        # REVENUECAT_ANDROID_KEY, GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
      vars:
        PACKAGE_NAME: "com.iscibul.app"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
      cancel_previous_builds: true
    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Analyze
        script: flutter analyze --no-fatal-warnings || true

      - name: Build Android AAB
        script: |
          BUILD_NUMBER=$(($(google-play get-latest-build-number \
            --package-name "$PACKAGE_NAME" \
            --tracks internal 2>/dev/null || echo "0") + 1))
          flutter build appbundle \
            --release \
            --build-number="$BUILD_NUMBER" \
            --dart-define=REVENUECAT_ANDROID_KEY=$REVENUECAT_ANDROID_KEY

    artifacts:
      - build/app/outputs/bundle/release/app-release.aab

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: false
      email:
        recipients:
          - $CM_COMMIT_EMAIL
        notify:
          success: true
          failure: true
